<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CampusPulse | Event Feedback</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .feedback-card {
            background-color: #1e293b;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 400px;
        }
        h2 { color: #38bdf8; margin-top: 0; }
        label { display: block; margin: 10px 0 5px; font-weight: bold; }
        input, select, textarea {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border-radius: 4px;
            border: 1px solid #334155;
            background-color: #0f172a;
            color: white;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            background-color: #38bdf8;
            color: #0f172a;
            border: none;
            padding: 12px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover { background-color: #0ea5e9; }
        .success-msg { color: #10b981; display: none; text-align: center; margin-top: 15px; }
    </style>
</head>
<body>

    <div class="feedback-card">
        <h2>Event Feedback</h2>
        <form id="feedbackForm" onsubmit="submitFeedback(event)">
            <label for="eventName">Event Name</label>
            <input type="text" id="eventName" placeholder="e.g., Tech Symposium 2026" required>

            <label for="rating">Rating</label>
            <select id="rating">
                <option value="5">⭐⭐⭐⭐⭐ (Excellent)</option>
                <option value="4">⭐⭐⭐⭐ (Good)</option>
                <option value="3">⭐⭐⭐ (Average)</option>
                <option value="2">⭐⭐ (Poor)</option>
                <option value="1">⭐ (Very Bad)</option>
            </select>

            <label for="comments">Comments</label>
            <textarea id="comments" rows="4" placeholder="Share your experience..." required></textarea>

            <button type="submit">Submit Review</button>
        </form>
        <div id="successMessage" class="success-msg">Thank you! Your feedback has been recorded.</div>
    </div>

    <script>
        function submitFeedback(event) {
            event.preventDefault();
            document.getElementById('feedbackForm').style.display = 'none';
            document.getElementById('successMessage').style.display = 'block';
        }
    </script>
</body>
</html>
