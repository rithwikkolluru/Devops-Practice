<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CampusPulse | College Event Hub it is for the Devops Experiment</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header id="app-header" class="hidden">
        <div class="logo">🚀 CampusPulse</div>
        <nav>
            <ul>
                <li><a href="#" id="nav-home" class="active" onclick="switchView('home-view')">Events</a></li>
                <li><a href="#" id="nav-bookings" onclick="switchView('bookings-view')">My Bookings</a></li>
                <li><a href="#" id="nav-profile" onclick="switchView('profile-view')">Profile</a></li>
                <li><button class="btn-secondary" onclick="logout()">Sign Out</button></li>
            </ul>
        </nav>
    </header>

    <main>
        <section id="login-view" class="auth-container">
            <h2>Welcome Back</h2>
            <p>Access your college event ecosystem</p>
            <form id="login-form" onsubmit="handleLogin(event)">
                <label>Student Email</label>
                <input type="email" id="login-email" value="alex.jones@college.edu" required>
                <label>Password</label>
                <input type="password" id="login-pass" value="password123" required>
                <button type="submit" class="btn-primary" style="width: 100%; margin-top: 10px;">Sign In</button>
            </form>
        </section>

        <section id="home-view" class="hidden">
            <div class="welcome-hero">
                <h1 id="welcome-message">Hello, Student!</h1>
                <p>Discover, schedule, and secure seats for the latest college meetups.</p>
            </div>
            <h2>Upcoming Dynamic Events</h2>
            <div id="events-container" class="event-grid"></div>
        </section>

        <section id="profile-view" class="hidden">
            <div class="profile-layout">
                <div class="profile-sidebar">
                    <img id="profile-avatar" class="avatar" src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?w=150" alt="Avatar">
                    <h3 id="side-name">Alex Jones</h3>
                    <p id="side-dept" style="color: var(--text-muted);">Computer Science</p>
                </div>
                <div class="profile-form-container">
                    <h2>Edit Registration Profile</h2>
                    <form id="profile-form" onsubmit="saveProfile(event)">
                        <label>Full Name</label>
                        <input type="text" id="prof-name" required>
                        <label>Department / Major</label>
                        <input type="text" id="prof-dept" required>
                        <label>Student ID / Roll No</label>
                        <input type="text" id="prof-id" readonly style="background-color: var(--background); color: var(--text-muted)">
                        <button type="submit" class="btn-primary">Update Details</button>
                    </form>
                </div>
            </div>
        </section>

        <section id="bookings-view" class="hidden">
            <h2>Your Confirmed Schedules</h2>
            <div id="bookings-container" class="booking-list"></div>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
